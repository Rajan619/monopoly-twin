<!DOCTYPE html>
<html>
<head>
    <title>Monopoly Twin - Calibrate</title>
    <script src="https://docs.opencv.org/4.10.0/opencv.js" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        video, canvas { width: 95%; max-width: 450px; border: 2px solid #555; border-radius: 10px; margin-top: 10px; }
        .btn { background: #008CBA; color: white; padding: 10px 20px; border: none; border-radius: 5px; margin: 10px; }
        #instructions { color: #ffeb3b; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>
    <div id="instructions">Tap the 4 corners of the board in the top view</div>
    <video id="videoInput" playsinline></video>
    <canvas id="canvasOutput"></canvas>
    <button class="btn" onclick="resetPoints()">Reset Corners</button>

    <script type="text/javascript">
        let points = [];
        const video = document.getElementById('videoInput');
        const instructions = document.getElementById('instructions');

        video.addEventListener('click', (e) => {
            if (points.length < 4) {
                const rect = video.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
                const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);
                points.push(x, y);
                if (points.length === 8) instructions.innerText = "Board Locked! Look at Digital Twin below.";
            }
        });

        function resetPoints() { points = []; instructions.innerText = "Tap the 4 corners of the board"; }

        function onOpenCvReady() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => { video.srcObject = stream; video.play(); startCV(); });
        }

        function startCV() {
            let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let dst = new cv.Mat(500, 500, cv.CV_8UC4);
            let cap = new cv.VideoCapture(video);

            function process() {
                cap.read(src);
                if (points.length === 8) {
                    let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, points);
                    let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, 500,0, 500,500, 0,500]);
                    let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
                    cv.warpPerspective(src, dst, M, new cv.Size(500, 500));
                    
                    // Add Pawn Tracking (Blue)
                    let hsv = new cv.Mat();
                    cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
                    cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);
                    let lowBlue = new cv.Mat(dst.rows, dst.cols, dst.type(), [100, 150, 50, 0]);
                    let highBlue = new cv.Mat(dst.rows, dst.cols, dst.type(), [140, 255, 255, 255]);
                    let mask = new cv.Mat();
                    cv.inRange(hsv, lowBlue, highBlue, mask);
                    // ... (finding contours and drawing rectangle on dst) ...
                    
                    cv.imshow('canvasOutput', dst);
                    M.delete(); srcCoords.delete(); dstCoords.delete(); hsv.delete(); mask.delete();
                }
                requestAnimationFrame(process);
            }
            requestAnimationFrame(process);
        }
        var Module = { onRuntimeInitialized: onOpenCvReady };
    </script>
</body>
</html>
