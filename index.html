<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArUco Detector</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

video,canvas{
width:90%;
max-width:500px;
border-radius:10px;
}

button{
padding:12px 20px;
font-size:18px;
margin:10px;
}

#log{
color:#00ff66;
font-size:12px;
white-space:pre-wrap;
text-align:left;
width:90%;
max-width:500px;
margin:auto;
}

</style>

</head>

<body>

<h2>ArUco Marker Detector</h2>

<button onclick="startCamera()">Start Camera</button>

<p id="status">Waiting...</p>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/js-aruco@1.3.0/build/aruco.js"></script>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let ctx = canvas.getContext("2d")

let log = document.getElementById("log")
let status = document.getElementById("status")

let detector = new AR.Detector()

function logMsg(msg){
console.log(msg)
log.innerText = msg + "\n" + log.innerText
}

async function startCamera(){

status.innerText = "Requesting camera..."

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject = stream

video.onloadedmetadata = ()=>{

canvas.width = video.videoWidth
canvas.height = video.videoHeight

status.innerText = "Camera running"

logMsg("Camera started")

requestAnimationFrame(loop)

}

}

function loop(){

ctx.drawImage(video,0,0,canvas.width,canvas.height)

let imageData = ctx.getImageData(0,0,canvas.width,canvas.height)

let markers = detector.detect(imageData)

if(markers.length > 0){

logMsg("Markers detected: " + markers.length)

for(let m of markers){

logMsg("Marker ID: " + m.id)

ctx.strokeStyle="lime"
ctx.lineWidth=3

ctx.beginPath()

ctx.moveTo(m.corners[0].x,m.corners[0].y)

for(let i=1;i<m.corners.length;i++){
ctx.lineTo(m.corners[i].x,m.corners[i].y)
}

ctx.closePath()
ctx.stroke()

}

}

requestAnimationFrame(loop)

}

</script>

</body>
</html>
