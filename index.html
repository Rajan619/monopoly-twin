<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Twin - Final Sync</title>
    <script async src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0/dist/opencv.min.js" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .status-bar { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #ff9800; }
        .synced { border-left-color: #4caf50; }
        video, canvas { width: 100%; max-width: 480px; border-radius: 10px; background: #000; border: 1px solid #444; touch-action: none; }
        h3 { font-size: 14px; color: #888; margin: 10px 0 5px 0; text-transform: uppercase; }
        .controls { margin: 15px 0; }
        button { background: #e91e63; color: white; border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status" class="status-bar">Waiting for OpenCV...</div>

    <h3>1. Bangalore Feed (Tap 4 Corners)</h3>
    <video id="videoInput" playsinline></video>

    <div class="controls">
        <button onclick="resetCalibration()">Reset Calibration</button>
    </div>

    <h3>2. Digital Twin (Warped View)</h3>
    <canvas id="canvasOutput"></canvas>

    <script type="text/javascript">
        let points = [];
        const video = document.getElementById('videoInput');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvasOutput');

        // Capture clicks on the video
        video.addEventListener('pointerdown', (e) => {
            if (points.length < 8) {
                const rect = video.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (video.videoWidth / rect.width);
                const y = (e.clientY - rect.top) * (video.videoHeight / rect.height);
                points.push(x, y);
                updateStatus();
            }
        });

        function updateStatus() {
            const count = points.length / 2;
            if (count < 4) {
                status.innerHTML = `Tap Corner ${count + 1} of 4`;
                status.className = "status-bar";
            } else {
                status.innerHTML = "BOARD SYNCED ✅";
                status.className = "status-bar synced";
            }
        }

        function resetCalibration() {
            points = [];
            updateStatus();
        }

        function onOpenCvReady() {
            status.innerHTML = "OpenCV Ready! Tap Top-Left corner.";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.play();
                    // Wait for video metadata to get correct dimensions
                    video.onloadedmetadata = () => startCV();
                });
        }

        function startCV() {
            const width = video.videoWidth;
            const height = video.videoHeight;
            let src = new cv.Mat(height, width, cv.CV_8UC4);
            let dst = new cv.Mat(500, 500, cv.CV_8UC4);
            let cap = new cv.VideoCapture(video);

            // Color detection mats (reused to save memory)
            let hsv = new cv.Mat();
            let mask = new cv.Mat();
            let lowBlue = new cv.Mat(500, 500, cv.CV_8UC3, [100, 150, 50, 0]);
            let highBlue = new cv.Mat(500, 500, cv.CV_8UC3, [140, 255, 255, 255]);

            function process() {
                try {
                    cap.read(src);

                    if (points.length === 8) {
                        // Create Perspective Warp
                        let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, points);
                        let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0,0, 500,0, 500,500, 0,500]);
                        let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
                        
                        cv.warpPerspective(src, dst, M, new cv.Size(500, 500));

                        // --- PAWN DETECTION START ---
                        cv.cvtColor(dst, hsv, cv.COLOR_RGBA2RGB);
                        cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);
                        cv.inRange(hsv, lowBlue, highBlue, mask);

                        let contours = new cv.MatVector();
                        let hierarchy = new cv.Mat();
                        cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                        for (let i = 0; i < contours.size(); ++i) {
                            if (cv.contourArea(contours.get(i)) > 300) {
                                let rect = cv.boundingRect(contours.get(i));
                                cv.rectangle(dst, new cv.Point(rect.x, rect.y), 
                                             new cv.Point(rect.x + rect.width, rect.y + rect.height), 
                                             [255, 0, 0, 255], 3);
                            }
                        }
                        // --- PAWN DETECTION END ---

                        // Draw Grid Lines
                        for(let i=0; i<=10; i++) {
                            let p = i * 50;
                            cv.line(dst, new cv.Point(p, 0), new cv.Point(p, 500), [255, 255, 255, 100], 1);
                            cv.line(dst, new cv.Point(0, p), new cv.Point(500, p), [255, 255, 255, 100], 1);
                        }

                        cv.imshow('canvasOutput', dst);

                        // Cleanup Frame Mats
                        M.delete(); srcCoords.delete(); dstCoords.delete();
                        contours.delete(); hierarchy.delete();
                    } else {
                        // Show raw feed with circles on tap points
                        let temp = src.clone();
                        for (let i = 0; i < points.length; i += 2) {
                            cv.circle(temp, new cv.Point(points[i], points[i+1]), 15, [255, 255, 0, 255], -1);
                        }
                        cv.imshow('canvasOutput', temp);
                        temp.delete();
                    }
                } catch (e) {
                    console.error("CV Error: ", e);
                }
                requestAnimationFrame(process);
            }
            requestAnimationFrame(process);
        }

        // Check if OpenCV is ready
        var Module = { onRuntimeInitialized: onOpenCvReady };
    </script>
</body>
</html>
