<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Twin - Fixed</title>
    <script async src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.12.0-release.1/dist/opencv.min.js" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .status { padding: 15px; margin: 10px; border-radius: 8px; background: #333; }
        .btn { background: #4CAF50; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; display: none; margin: 20px auto; }
        video, canvas { width: 100%; max-width: 400px; border: 2px solid #444; border-radius: 10px; background: #000; display: block; margin: 10px auto; }
    </style>
</head>
<body>

    <h2>Monopoly Twin</h2>
    <div id="status" class="status">Step 1: Downloading OpenCV...</div>
    
    <button id="startBtn" class="btn">Start Camera</button>

    <video id="videoInput" playsinline></video>
    <canvas id="canvasOutput"></canvas>

    <script type="text/javascript">
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('videoInput');

        // Check if OpenCV is loaded every second
        let checkOpenCV = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                clearInterval(checkOpenCV);
                status.innerHTML = "Step 2: OpenCV Loaded! Tap below.";
                startBtn.style.display = "block";
            }
        }, 1000);

        startBtn.onclick = function() {
            status.innerHTML = "Step 3: Accessing Camera...";
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            })
            .then(stream => {
                video.srcObject = stream;
                video.play();
                startBtn.style.display = "none";
                status.innerHTML = "System Running!";
                processVideo();
            })
            .catch(err => {
                status.innerHTML = "Camera Error: " + err.name;
            });
        };

        function processVideo() {
            let cap = new cv.VideoCapture(video);
            let frame = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let dst = new cv.Mat(400, 400, cv.CV_8UC4);

            function capture() {
                try {
                    cap.read(frame);
                    // Standard display of camera feed to verify it works
                    cv.imshow('canvasOutput', frame);
                    requestAnimationFrame(capture);
                } catch (e) {
                    console.error(e);
                }
            }
            capture();
        }
    </script>
</body>
</html>
